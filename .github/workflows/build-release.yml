name: Build & Release

'on':
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - windows
          - macos

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CHATBOX_BUILD_PLATFORM: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack install --global pnpm@10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package (Windows x64)
        run: pnpm exec electron-builder build --publish never --win --x64
        env:
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''

      - uses: actions/upload-artifact@v4
        with:
          name: chatbox-windows-x64
          path: release/build/*.exe
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/build/*.exe
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CHATBOX_BUILD_PLATFORM: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack install --global pnpm@10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package (macOS ARM64)
        run: pnpm exec electron-builder build --publish never --mac --arm64
        env:
          APPLE_ID: ''
          APPLE_ID_PASS: ''
          APPLE_TEAM_ID: ''

      - uses: actions/upload-artifact@v4
        with:
          name: chatbox-macos-arm64
          path: release/build/*.dmg
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/build/*.dmg
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
