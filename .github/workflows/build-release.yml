name: Build & Release

'on':
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CHATBOX_BUILD_PLATFORM: electron
      CSC_LINK: ''
      CSC_KEY_PASSWORD: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack & pnpm
        run: |
          corepack enable
          corepack install --global pnpm@10.33.0
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Debug build output
        run: |
          dir release\app\dist /s /b 2>nul || echo "No dist dir"
          dir release\build 2>nul || echo "No build dir"

      - name: Package
        run: npx electron-builder build --publish never --win

      - uses: actions/upload-artifact@v4
        with:
          name: chatbox-windows-x64
          path: release/build/*.exe
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/build/*.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CHATBOX_BUILD_PLATFORM: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack & pnpm
        shell: bash
        run: |
          corepack enable
          corepack install --global pnpm@10.33.0
          pnpm --version

      - name: Install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build & package
        shell: bash
        run: pnpm run build && pnpm exec electron-builder build --publish never --mac

      - uses: actions/upload-artifact@v4
        with:
          name: chatbox-macos-arm64
          path: release/build/*.dmg
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/build/*.dmg
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
