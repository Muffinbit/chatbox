name: Build & Release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CHATBOX_BUILD_PLATFORM: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack & pnpm
        run: |
          corepack enable
          corepack install --global pnpm@10.33.0
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package
        run: npx electron-builder build --publish never --win --x64

      - uses: actions/upload-artifact@v4
        with:
          name: chatbox-windows-x64
          path: release/build/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CHATBOX_BUILD_PLATFORM: electron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack & pnpm
        shell: bash
        run: |
          corepack enable
          corepack install --global pnpm@10.33.0
          pnpm --version

      - name: Install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build & package
        shell: bash
        run: pnpm run build && pnpm exec electron-builder build --publish never --mac

      - uses: actions/upload-artifact@v4
        with:
          name: chatbox-macos-arm64
          path: release/build/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: chatbox-windows-x64
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: chatbox-macos-arm64
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
